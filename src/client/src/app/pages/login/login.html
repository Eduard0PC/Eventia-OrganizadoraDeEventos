<app-auth-layout>

  <div class="w-full max-w-md bg-gray-900 rounded-2xl shadow-xl p-8">

    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-100">
        Iniciar Sesión
      </h2>

      <p class="text-gray-100 mt-2">
        Accede a las funcionalidades para organizar tus eventos
      </p>
    </div>

    <form class="space-y-5" (ngSubmit)="submit()">

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Correo electrónico
        </label>

        <input
          name="email"
          type="email"
          placeholder="correo@ejemplo.com"
          [(ngModel)]="email"
          autocomplete="email"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg 
          placeholder:text-gray-600
          focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Contraseña
        </label>

        <input
          name="password"
          type="password"
          placeholder="********"
          [(ngModel)]="password"
          autocomplete="current-password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg 
          placeholder:text-gray-600 
          focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      @if (error) {
        <p class="text-sm text-red-300">
          {{ error }}
        </p>
      }

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-red-600 hover:bg-red-700 disabled:bg-red-800 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition"
      >
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>

    </form>

    <div class="mt-6 text-center">
      <a
        routerLink="/forgot-password"
        class="text-red-600 hover:text-red-700 text-sm"
      >
        ¿Olvidaste tu contraseña?
      </a>
    </div>

    <div class="mt-4 text-center">
      <span class="text-gray-500">
        ¿No tienes cuenta?
      </span>

      <a
        routerLink="/register"
        class="text-red-600 font-semibold ml-1"
      >
        Regístrate
      </a>
    </div>

  </div>

</app-auth-layout>
