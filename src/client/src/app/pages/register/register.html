<app-auth-layout>
  <div class="w-full max-w-md bg-gray-900 rounded-2xl shadow-xl p-8">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-100">
        Crear Cuenta
      </h2>

      <p class="text-gray-100 mt-2">
        Registre para acceder a las funcionalidades para organizar tus eventos
      </p>
    </div>

    <form class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Nombre completo
        </label>

        <input
          type="text"
          placeholder="Juan Pérez"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg
          placeholder:text-gray-600
          focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Teléfono
        </label>

        <input
          type="tel"
          placeholder="9991234567"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg
          placeholder:text-gray-600
          focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Correo electrónico
        </label>

        <input
          type="email"
          placeholder="correo@ejemplo.com"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg
          placeholder:text-gray-600
          focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Contraseña
        </label>

        <input
          type="password"
          placeholder="********"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg
          placeholder:text-gray-600
          focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Confirmar contraseña
        </label>

        <input
          type="password"
          placeholder="********"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg
          placeholder:text-gray-600
          focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg transition"
      >
        Registrarme
      </button>

    </form>

    <div class="mt-4 text-center">
      <span class="text-gray-500">
        ¿Ya tienes cuenta?
      </span>

      <a
        routerLink="/login"
        class="text-yellow-600 font-semibold ml-1"
      >
        Iniciar sesión
      </a>
    </div>

  </div>
</app-auth-layout>
